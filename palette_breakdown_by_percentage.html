
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0;display:flex;flex-direction:column;gap:28px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden}
.card-head{padding:10px 16px 9px;display:flex;align-items:baseline;gap:10px;border-bottom:0.5px solid var(--color-border-tertiary)}
.card-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.card-tag{font-size:11px;color:var(--color-text-secondary)}
.bar-row{display:flex;height:56px}
.seg{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:5px;transition:flex .2s ease;cursor:default;position:relative;overflow:hidden}
.seg:hover{flex:3!important}
.seg-pct{font-size:9px;font-weight:500;letter-spacing:.04em}
.breakdown{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0}
.slot{padding:7px 10px 8px;border-right:0.5px solid var(--color-border-tertiary);border-top:0.5px solid var(--color-border-tertiary)}
.slot:nth-child(4n){border-right:none}
.slot-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;flex-shrink:0}
.slot-name{font-size:10px;color:var(--color-text-secondary);display:flex;align-items:center;margin-bottom:2px}
.slot-hex{font-size:10px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
.slot-pct{font-size:10px;color:var(--color-text-secondary);float:right}
.fonts-row{padding:7px 16px 8px;font-size:11px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:18px;flex-wrap:wrap}
.fonts-row b{color:var(--color-text-primary);font-weight:500}
</style>

function luminance(hex){
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const toL=c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*toL(r)+0.7152*toL(g)+0.0722*toL(b);
}
function textOn(hex){return luminance(hex)>0.35?'#1a1a1a':'#f5f5f5';}

  });
